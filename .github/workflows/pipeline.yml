name: OOBT Pandas Pipeline

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython numpy python-dateutil pytz setuptools wheel meson-python versioneer

      - name: Clone pandas v3.0.2 from GitHub
        run: |
          git clone --depth 1 --branch v3.0.2 https://github.com/pandas-dev/pandas.git pandas-src

      - name: Build pandas from source
        run: |
          cd pandas-src
          pip install -e . --no-build-isolation
          cd ..

      - name: Verify pandas version
        run: |
          python -c "import pandas as pd; print('Pandas version:', pd.__version__)"

      - name: Run pandas own unit tests (smoke test)
        run: |
          pip install pytest
          python -m pytest pandas-src/pandas/tests/test_common.py -v --tb=short -q || true

      - name: Install test dependencies
        run: |
          pip install pytest pytest-benchmark

      - name: Run functional tests
        run: |
          python -m pytest tests/functional/ -v --tb=short

      - name: Run performance tests
        run: |
          python -m pytest tests/performance/ -v --tb=short

      - name: Summary
        run: |
          echo "=============================="
          echo "  Pipeline zakończony pomyślnie"
          echo "=============================="
          python -c "import pandas as pd; print('Przetestowana wersja Pandas:', pd.__version__)"
